<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Newman Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .thank-you-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .thank-you-container h1 {
            font-family: 'Playfair Display';
            font-size: 54px;
            color: #050b1a;
            margin-bottom: 20px;
        }
        .thank-you-container p {
            font-size: 18px;
            color: #555;
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .back-home {
            background: #050b1a;
            color: #fff;
            padding: 15px 40px;
            text-decoration: none;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        .back-home:hover { background: #d4af37; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="images/Final_Logos_(1).png" alt="Newman Exclusive" class="logo-img"></a>
        </div>
    </header>

    <main class="thank-you-container">
        <h1>Message Received.</h1>
        <p>Thank you for reaching out to Newman Exclusive. A member of our tailoring team will review your inquiry and contact you within 24 hours to discuss your bespoke requirements.</p>
        <a href="index.html" class="back-home">Return to Home</a>
    </main>
</body>
</html>
