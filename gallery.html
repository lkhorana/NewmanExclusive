    <style>
        :root {
            --gold: #d4af37;
            --navy: #1a263c; 
            --white: #ffffff;
            --dark-bg: #050b1a;
        }

        header.main-header {
            background-color: var(--navy);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            min-height: 90px;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 9999;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .brand-identity { display: flex; align-items: center; gap: 15px; text-decoration: none; flex-shrink: 0; }
        .logo-area img { height: 65px; width: auto; display: block; }
        .brand-name-fancy { font-family: 'Great Vibes', cursive; color: var(--gold); font-size: 32px; white-space: nowrap; }
        nav { display: flex; align-items: center; }
        .nav-links { display: flex; list-style: none; gap: 20px; flex-wrap: nowrap; justify-content: flex-end; padding: 0; margin: 0; }
        .nav-links li a { color: white; text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; transition: color 0.3s; }
        .nav-links li a:hover { color: var(--gold); }


        * { margin: 0; padding: 0; box-sizing: border-box !important; }
        body { font-family: 'Roboto', sans-serif; background: var(--dark-bg); color: var(--white); overflow-x: hidden; }

        /* --- UNIVERSAL NAVIGATION STANDARD --- */

        /* --- GALLERY HEADER --- */
        .gallery-intro {
            padding: 80px 5% 40px;
            text-align: center;
        }

        .gallery-intro h1 {
            font-family: 'Playfair Display';
            font-size: clamp(32px, 5vw, 48px);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .gallery-intro p {
            letter-spacing: 4px;
            font-weight: 300;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* --- FILTER BUTTONS --- */
        .filter-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 50px;
            padding: 0 5%;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.4s;
        }

        .filter-btn:hover, .filter-btn.active {
            opacity: 1;
            color: var(--gold);
        }

        /* --- MASONRY GRID --- */
        .gallery-grid {
            width: 95%;
            max-width: 1600px;
            margin: 0 auto 100px;
            column-count: 3;
            column-gap: 15px;
        }

        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            background: #000;
            transition: transform 0.4s ease;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.8s ease;
        }

        .gallery-item:hover img, .gallery-item:hover video {
            transform: scale(1.05);
        }

        .video-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 50%;
            z-index: 5;
            border: 1px solid var(--gold);
            pointer-events: none;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.8s ease;
        }

        /* --- NAVIGATION MOBILE FIX --- */
        @media (max-width: 1024px) {
            .gallery-grid { column-count: 2; }
        }

        @media (max-width: 600px) {
            header.main-header { flex-direction: column; padding: 15px 5%; min-height: auto; }
            .brand-identity { margin-bottom: 5px; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px 15px; padding: 5px 0; }

            .gallery-grid { column-count: 1; }
        }


    </style>

    <script>
        function filterGallery(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'inline-block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
