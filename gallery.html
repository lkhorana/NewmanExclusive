    <style>
        :root {
            --gold: #d4af37;
            --navy: #1a263c; 
            --white: #ffffff;
            --dark-bg: #050b1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box !important; }
        body { font-family: 'Roboto', sans-serif; background: var(--dark-bg); color: var(--white); overflow-x: hidden; }

        /* --- UNIVERSAL NAVIGATION STANDARD --- */
        header.main-header {
            background-color: var(--navy) !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 0 5% !important;
            min-height: 90px !important;
            height: auto !important;
            width: 100% !important;
            position: sticky; top: 0; z-index: 9999 !important;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .brand-identity { display: flex !important; align-items: center !important; gap: 15px !important; text-decoration: none !important; flex-shrink: 0 !important; }
        .logo-area img { height: 65px !important; width: auto !important; display: block !important; }
        .brand-name-fancy { font-family: 'Great Vibes', cursive !important; color: var(--gold) !important; font-size: 32px !important; white-space: nowrap !important; }

        .nav-links { display: flex !important; list-style: none !important; gap: 20px !important; flex-wrap: wrap !important; justify-content: center !important; padding: 10px 0 !important; }
        .nav-links li a { color: white !important; text-decoration: none !important; font-size: 11px !important; letter-spacing: 2px !important; text-transform: uppercase !important; font-weight: 700 !important; }

        /* --- GALLERY HEADER --- */
        .gallery-intro {
            padding: 80px 5% 40px;
            text-align: center;
        }

        .gallery-intro h1 {
            font-family: 'Playfair Display';
            font-size: clamp(32px, 5vw, 48px);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .gallery-intro p {
            letter-spacing: 4px;
            font-weight: 300;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* --- FILTER BUTTONS --- */
        .filter-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 50px;
            padding: 0 5%;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.4s;
        }

        .filter-btn:hover, .filter-btn.active {
            opacity: 1;
            color: var(--gold);
        }

        /* --- MASONRY GRID --- */
        .gallery-grid {
            width: 95%;
            max-width: 1600px;
            margin: 0 auto 100px;
            column-count: 3;
            column-gap: 15px;
        }

        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            background: #000;
            transition: transform 0.4s ease;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.8s ease;
        }

        .gallery-item:hover img, .gallery-item:hover video {
            transform: scale(1.05);
        }

        .video-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 50%;
            z-index: 5;
            border: 1px solid var(--gold);
            pointer-events: none;
        }

        /* --- NAVIGATION MOBILE FIX --- */
        @media (max-width: 1024px) {
            header.main-header { flex-direction: column !important; padding: 15px 0 !important; }
            .brand-identity { margin-bottom: 5px !important; }
            .nav-links { gap: 10px 15px !important; padding: 5px 5% !important; }
            .gallery-grid { column-count: 2; }
        }

        @media (max-width: 600px) {
            .gallery-grid { column-count: 1; }
        }
    </style>
</head>

    <script>
        function filterGallery(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'inline-block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
